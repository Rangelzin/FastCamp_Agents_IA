services:
  n8n:
    container_name: n8n-aula
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n/:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
    restart: unless-stopped
    networks:
      - n8n-network
  
  postgres:
    container_name: postgres-aula
    image: postgres:13
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - n8n-network
    
  qdrant:
    container_name: qdrant-aula
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - "6333"
      - "6334"
      - "6335"
    volumes:
      - ./qdrant/qdrant_data:/qdrant/storage:z
      - ./qdrant/production.yaml:/qdrant/config/production.yaml:ro
    restart: always
    networks:
      - n8n-network
  
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

networks:
  n8n-network:
    driver: bridge  

volumes:
  ollama_data:
    driver: local
  